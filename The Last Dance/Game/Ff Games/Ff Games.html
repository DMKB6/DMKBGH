<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>
  <link rel="stylesheet" href="Ff Games.css">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;

}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
}

.container{
    position:relative;
    display:flex;
    gap:70px;
    z-index:1;
}

.circle{
    width:220px;
    height:220px;
    border-radius:50%;
    overflow:hidden;
    border:5px solid cyan;
    box-shadow:
        0 0 15px cyan,
        0 0 35px cyan,
        inset 0 0 15px rgba(0,255,255,.4);
    transition:.4s;
    cursor:pointer;
}

.circle:hover{
    transform:scale(1.08);
    box-shadow:
        0 0 25px cyan,
        0 0 60px cyan;
}

.circle img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    margin-top:15px;
    text-align:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    text-shadow:0 0 10px cyan;
}

.player{
    display:flex;
    flex-direction:column;
    align-items:center;
}

@media(max-width:650px){

.container{
    flex-direction:column;
    gap:40px;
}

.circle{
    width:180px;
    height:180px;
}

}

</style>

</head>
<body>

 <video id="bg-video" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
</video>




    <button class="close-btn" onclick="history.back()">✕</button>

<div class="container">

    <div class="player">
        <div class="circle">
            <a href="Tournament main page/Tournament.html">
            <img src="ff turnament profilee logo.png" alt="">
             </a>
        </div>
        <div class="name">Tournament</div>
    </div>

    <div class="player">
        <div class="circle">
            <a href="Guild Glory/Guild Glory.html">
            <img src="Guild profile logo.png" alt="">
            </a>
        </div>
        <div class="name">Guild</div>
    </div>

</div>

</body>
</html>
