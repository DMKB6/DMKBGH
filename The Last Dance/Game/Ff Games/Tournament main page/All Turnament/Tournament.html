<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Fire Tournament Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="Tournament.css">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#050816;
overflow-x:hidden;
color:#fff;
}

/* ===== Animated Background ===== */

body::before{
content:"";
position:fixed;
left:-50%;
top:-50%;
width:200%;
height:200%;
background:
radial-gradient(circle,#00e5ff55 2px,transparent 3px),
radial-gradient(circle,#ff00ff33 2px,transparent 4px);
background-size:60px 60px;
animation:moveStars 25s linear infinite;
z-index:-2;
}

@keyframes moveStars{
100%{
transform:translate(180px,180px);
}
}

body::after{
content:"";
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:linear-gradient(-45deg,#020024,#001b44,#081b29,#020024);
background-size:400% 400%;
animation:bg 10s infinite alternate;
z-index:-3;
}

@keyframes bg{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.container{
width:95%;
max-width:1200px;
margin:auto;
padding:25px;
}

/* ===== Tournament Header ===== */

.header{
position:relative;
padding:30px;
border-radius:25px;
text-align:center;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:2px solid cyan;
overflow:hidden;
box-shadow:0 0 35px cyan;
animation:glow 2s infinite alternate;
}

.header h1{
font-size:42px;
letter-spacing:3px;
}

.header p{
margin-top:8px;
color:#ccc;
}

@keyframes glow{
from{
box-shadow:0 0 20px cyan;
}
to{
box-shadow:0 0 60px #00ffff;
}
}

.header::before{
content:"";
position:absolute;
left:-120%;
top:0;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,#ffffff88,transparent);
animation:shine 3s infinite;
}

@keyframes shine{
100%{
left:150%;
}
}

/* ===== Summary Cards ===== */

.summary{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,.08);
border:2px solid rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
text-align:center;
transition:.4s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 30px cyan;
border-color:cyan;
}

.card h2{
font-size:30px;
margin-top:10px;
color:#00ffff;
}

.card span{
font-size:15px;
color:#ddd;
}

/* ===== Leaderboard Header ===== */

.tableHeader{
margin-top:35px;
display:grid;
grid-template-columns:2fr repeat(4,1fr);
gap:15px;
padding:18px;
background:linear-gradient(90deg,#ff9800,#ffd700);
color:#111;
font-weight:bold;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px gold;
}
/* ===== Player Row ===== */

.players{
margin-top:20px;
display:flex;
flex-direction:column;
gap:18px;
}

.player{
display:grid;
grid-template-columns:2fr repeat(4,1fr);
align-items:center;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:2px solid rgba(255,255,255,.15);
position:relative;
overflow:hidden;
transition:.4s;
animation:fadeUp .8s ease;
}

.player::before{
content:"";
position:absolute;
left:-120%;
top:0;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.5),
transparent
);
animation:shinePlayer 4s linear infinite;
}

@keyframes shinePlayer{
100%{
left:150%;
}
}

.player:hover{
transform:translateY(-8px) scale(1.02);
border-color:#00ffff;
box-shadow:
0 0 20px cyan,
0 0 40px #00ffff55,
0 0 60px #00ffff22;
}

.player div{
text-align:center;
font-size:18px;
font-weight:700;
}

.player .name{
text-align:left;
padding-left:20px;
font-size:20px;
}

.gold{
border:2px solid gold;
box-shadow:0 0 25px gold;
}

.silver{
border:2px solid silver;
box-shadow:0 0 25px silver;
}

.bronze{
border:2px solid #cd7f32;
box-shadow:0 0 25px #cd7f32;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== Responsive ===== */

@media(max-width:900px){

.summary{
grid-template-columns:repeat(2,1fr);
}

.tableHeader,
.player{
grid-template-columns:repeat(5,1fr);
font-size:14px;
}

.player .name{
font-size:16px;
padding-left:5px;
}

.header h1{
font-size:28px;
}

}

@media(max-width:600px){

.summary{
grid-template-columns:1fr;
}

.tableHeader,
.player{

font-size:12px;
padding:12px;

}

}

</style>
</head>

<script>

const cards=document.querySelectorAll(".player");

cards.forEach((card,index)=>{

card.style.opacity="0";
card.style.transform="translateY(50px)";

setTimeout(()=>{

card.style.transition="all .8s ease";
card.style.opacity="1";
card.style.transform="translateY(0)";

},index*180);

});

setInterval(()=>{

cards.forEach(card=>{

const glow=Math.floor(Math.random()*25)+20;

card.style.boxShadow=
`0 0 ${glow}px cyan`;

});

},1200);

</html>
