<style>










*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    height:100vh;
    overflow:hidden;

    font-family:Arial, sans-serif;


    background-image:url("Good bye2.jpg");

    background-size:cover;

    background-position:center;


}


/* Dark overlay */

body::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;


    background:rgba(0,0,0,0.55);

}



/* Main message */

.message{


    position:absolute;


    /* লেখার position পরিবর্তন করবে এখানে */

    top:80px;

    left:50%;


    transform:translateX(-50%);



    width:85%;


    color:white;


    text-align:center;


    font-size:35px;


    line-height:1.5;


    text-shadow:2px 2px 10px black;


}



/* Timer */

.timer-box{


    position:absolute;


    /* Timer এর position পরিবর্তন করবে এখানে */


    top:450px;


    left:50%;


    transform:translateX(-50%);



    color:white;


    font-size:90px;


    font-weight:bold;


    letter-spacing:5px;


    text-shadow:3px 3px 15px black;

 white-space:nowrap;

}




/* নিচের ছোট লেখা */

.footer{


    position:absolute;


    bottom:40px;


    width:100%;


    text-align:center;


    color:white;


    font-size:25px;


    text-shadow:2px 2px 10px black;


}

<div class="message">


When the clock strikes noon, everything may look exactly the same...<br>


Except, I won't be there.<br>


Some goodbyes are never spoken.<br>


Some stories end without a final line.


</div>




<div class="timer-box" id="timer">

00 : 00 : 00 : 00

</div>




<div class="footer">


July 17 | Friday | 12:00 PM<br>

The Last Dance

</div>





<script>



const endTime = new Date("2026-07-17T12:00:00").getTime();



const countdown = setInterval(function(){



const now = new Date().getTime();


const distance = endTime - now;



if(distance <= 0){


clearInterval(countdown);


document.getElementById("timer").innerHTML = "Time's Up!";


return;


}



const days = Math.floor(distance / (1000*60*60*24));


const hours = Math.floor(
(distance % (1000*60*60*24))/(1000*60*60)
);



const minutes = Math.floor(
(distance % (1000*60*60))/(1000*60)
);



const seconds = Math.floor(
(distance % (1000*60))/1000
);




document.getElementById("timer").innerHTML =


String(days).padStart(2,"0") 
+ " : " +


String(hours).padStart(2,"0") 
+ " : " +


String(minutes).padStart(2,"0") 
+ " : " +


String(seconds).padStart(2,"0");



},1000);



</script>
