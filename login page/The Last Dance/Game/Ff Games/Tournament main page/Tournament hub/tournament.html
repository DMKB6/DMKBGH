<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1st Tournament</title>

<link rel="stylesheet" href="tournent.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<body>


    <button class="close-btn" onclick="history.back()">✕</button>


<div class="bg-animation"></div>

<div class="container">

    <!-- Tournament -->
    <div class="title-box glow-border">
        <h1>🏆 1st Tournament</h1>
    </div>

    <!-- Date -->
    <div class="date-box glow-border">
        <span style="color:white;">📅 15 July 2026</span>
    </div>

    <!-- Time -->
    <div class="time-box">
        ⏰ 09:19 AM - 09:37 AM
    </div>

    <!-- Table -->
    <div class="table-box glow-border">

        <div class="table-header">

            <div>Name</div>
            <div>Position</div>
            <div>Kill</div>
            <div>Score</div>

        </div>

       

        <div class="player">

            <div>Davil</div>
            <div class="gold">🥇 1st</div>
            <div>2</div>
            <div>30</div>

        </div>



 <div class="player">

            <div>Taki</div>
            <div class="silver">🥈 2nd</div>
            <div>1</div>
            <div>13</div>

        </div>


     

        <div class="player">

            <div>Muhit</div>
            <div>3rd 🥉</div>
            <div>0</div>
            <div>6</div>

        </div>



   <div class="player">

            <div>Sayem</div>
            <div>4th</div>
            <div>1</div>
            <div>6</div>

        </div>


        <div class="player">

            <div>Raki</div>
            <div>5th</div>
            <div>0</div>
            <div>2</div>

        </div>

    </div>

</div>
