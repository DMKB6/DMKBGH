<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guild Glory</title>

<link rel="stylesheet" href="Guild Glory.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0d1117;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;



    /* Background Image */
    background-image:url("guild.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

}

/* Main Container */

.container{
    width:350px;
}

/* Top Animation */

.top-line{
    width:100%;
    height:4px;
    background:linear-gradient(90deg,
    transparent,
    #00ffff,
    #00ff88,
    #00ffff,
    transparent);
    background-size:300%;
    border-radius:20px;
    margin-bottom:20px;
    animation:move 3s linear infinite;
}

@keyframes move{

0%{
background-position:0%;
}

100%{
background-position:300%;
}

}

/* Link */

.card{
    text-decoration:none;
}

/* Box */

.box{
    background:#161b22;
    color:white;
    border:2px solid #30363d;
    border-radius:18px;
    padding:20px;
    margin:15px 0;
    text-align:center;
    transition:.4s;
    box-shadow:0 0 15px rgba(0,255,255,.15);
}

.box h2{
    font-size:28px;
    letter-spacing:1px;
}

.box:hover{
    transform:translateY(-8px) scale(1.03);
    border-color:#00ffff;
    box-shadow:0 0 30px cyan;
}

</style>

</head>

<body>


    <button class="close-btn" onclick="history.back()">✕</button>

<div class="container">

<div class="top-line"></div>

<a class="card" href="score/score.html">
<div class="box">
<h2>Today</h2>
</div>
</a>

<a class="card" href="Week Score/Weeeeek Score.Html">
<div class="box">
<h2>This Week</h2>
</div>
</a>

<a class="card" href="Total/Total.html">
<div class="box">
<h2>Total</h2>
</div>
</a>

</div>

</body>
</html>
